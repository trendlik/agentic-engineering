# Template for role-scoping the implement-issue skill on a project.
#
# Copy this file to the TARGET PROJECT's repo root as `ROLES.yml` (next to
# CLAUDE.md/AGENTS.md) — it does NOT belong in this skill's own directory,
# since roles are per-project, not per-skill.
#
# Format is deliberately restricted so it can be parsed without a real YAML
# library (see scripts/role.sh): exactly one `github-username: role` LINE
# per user. Blank lines and lines starting with `#` are ignored. Trailing
# `# comments` after the role are stripped. Only the FIRST line for a given
# username is ever read — repeating a username on multiple lines to give it
# multiple roles does NOT work (only the first line wins); use a
# comma-separated list on that one line instead (see erin, below).
#
# Valid roles: analyst, architect, developer, qa
#   analyst   — finalizes the feature description (Phase 1: Clarify)
#   architect — approves the implementation plan (Phase 2: Plan)
#   developer — oversees implementation, review, and CI (Phases 3, 5, 7)
#   qa        — oversees testing (Phase 4: Test)
#
# A single person can hold more than one role — comma-separate them on
# their one line. Useful for solo testing (one account playing every role)
# or a small team where roles aren't fully split up yet:
#   erin: analyst,architect,developer,qa
#
# If this file is absent, or a user isn't listed in it, role.sh fails open —
# nothing is restricted. This is advisory only today (a warning if the wrong
# role runs a phase); real enforcement is a future, server-side step
# (verify-gates.sh), which is NOT lenient — see that script's header comment.

alice: analyst
bob: architect
carol: developer
dave: qa
erin: analyst,architect,developer,qa
